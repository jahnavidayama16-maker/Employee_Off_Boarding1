{% extends 'base.html' %}
{% block content %}
<div class="row pt-4">
    <div class="col-md-8 mx-auto">
        <div class="card shadow border-0 radius-lg">
            <div class="card-header bg-white border-0 pt-4 pb-0">
                <h4 class="mb-0 text-primary"><i class="bi bi-file-earmark-text"></i> Request Resignation</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-3 shadow-sm fw-bold">Submit Resignation Request</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
